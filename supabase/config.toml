# Newer Supabase CLI versions expect `project_id` as a top-level key
# instead of an `[project]` table with `id`. The old `[project]` block
# is rejected as "invalid keys: project".
project_id = "scenecheck"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[auth]
enabled = true
site_url = "http://localhost:3000"

[auth.email]
enable_signup = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "5MB"

[realtime]
enabled = true
