name: Scrape events (FR6)

# Runs the events scraper on a schedule and POSTs each result to the
# `ingest-scraped` Edge Function, which inserts them with source='scraped'
# (the app renders scraped events as "Recommended"). This is the CI-only
# runner the test plan refers to — it never touches the app build.

on:
  schedule:
    - cron: '0 8 * * *'      # daily at 08:00 UTC
  workflow_dispatch: {}        # adds a manual "Run workflow" button

# Don't pile up overlapping nightly runs.
concurrency:
  group: scrape-events
  cancel-in-progress: false

# Least-privilege: the scraper only reads the repo + POSTs to the Supabase
# Edge Function; it never needs write access to anything on GitHub.
permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.3.0
        with:
          node-version: '22'   # global fetch built in; no deps (the scraper parses JSON-LD with regex)

      # The scraper needs NO npm install — it uses built-in fetch + a regex over
      # the page's JSON-LD (no cheerio/playwright). Only add those if you switch
      # to DOM/JS-rendered scraping.

      - name: Check required secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
        run: |
          test -n "$SUPABASE_URL" && test -n "$SUPABASE_SECRET_KEY" && test -n "$INGEST_TOKEN" \
            || { echo "Missing required repository secret(s) - set SUPABASE_URL, SUPABASE_SECRET_KEY, INGEST_TOKEN"; exit 1; }

      - name: Scrape + ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}                # https://<ref>.supabase.co
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}  # sb_secret_… (new key; replaces service_role)
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}                # shared secret the function matches (x-ingest-token)
        run: node scripts/scrape-events.mjs
