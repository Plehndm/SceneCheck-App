name: Scrape events (FR6)

# Runs the events scraper on a schedule and POSTs each result to the
# `ingest-scraped` Edge Function, which inserts them with source='scraped'
# (the app renders scraped events as "Recommended"). This is the CI-only
# runner the test plan refers to — it never touches the app build.

on:
  schedule:
    - cron: '0 8 * * *'      # daily at 08:00 UTC
  workflow_dispatch: {}        # adds a manual "Run workflow" button

# Don't pile up overlapping nightly runs.
concurrency:
  group: scrape-events
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'   # global fetch built in; no deps (the scraper parses JSON-LD with regex)

      # The scraper needs NO npm install — it uses built-in fetch + a regex over
      # the page's JSON-LD (no cheerio/playwright). Only add those if you switch
      # to DOM/JS-rendered scraping.

      - name: Diagnostics (file presence, secrets, function reachability)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
        run: |
          echo "cwd: $(pwd)"
          echo "node: $(node -v)"
          echo "--- scripts/ ---"; ls -la scripts || echo "(no scripts dir)"
          chk() { if [ -n "$2" ]; then echo "$1: set (${#2} chars)"; else echo "$1: MISSING"; fi; }
          chk SUPABASE_URL "$SUPABASE_URL"
          chk SUPABASE_SECRET_KEY "$SUPABASE_SECRET_KEY"
          chk INGEST_TOKEN "$INGEST_TOKEN"
          # Probe the function with an EMPTY body to isolate auth from scraping:
          #   401            → INGEST_TOKEN mismatch, or not deployed --no-verify-jwt
          #   400 (missing…) → auth PASSED + function deployed (so the scrape is the issue)
          #   404            → function not deployed
          echo "--- function auth probe (empty POST) ---"
          code=$(curl -s -o /tmp/resp -w "%{http_code}" -X POST "$SUPABASE_URL/functions/v1/ingest-scraped" \
            -H "apikey: $SUPABASE_SECRET_KEY" -H "x-ingest-token: $INGEST_TOKEN" \
            -H "content-type: application/json" -d '{}') || echo "(curl failed)"
          echo "HTTP $code"; cat /tmp/resp 2>/dev/null; echo

      - name: Scrape + ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}                # https://<ref>.supabase.co
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}  # sb_secret_… (new key; replaces service_role)
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}                # shared secret the function matches (x-ingest-token)
        run: node scripts/scrape-events.mjs
